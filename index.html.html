
<style>

<script>
const qs = [
  {
    n:1, topic:"Neurology/Memory",
    q:"A patient can repeat a five-digit span forward and backward and is able to list five months backwards. He is unable to remember a list of four objects given to him five minutes previously. This type of memory problem would be found in a disease affecting which one of the following?",
    choices:["A. Frontal lobe","B. Temporal lobe","C. Parietal lobe","D. Occipital lobe","E. Brain stem"],
    ans:1,
    exp:"The patient has intact working memory (digit span, reverse months) but impaired delayed recall — this is a classic anterograde memory deficit. The hippocampus, located in the medial temporal lobe, is the key structure for forming new long-term memories. Damage here (e.g., in Alzheimer's or temporal lobe epilepsy) causes this pattern.",
    kw:["Anterograde amnesia","Hippocampus","Temporal lobe","Delayed recall","Working memory"],
    nv:"Normal digit span: 5-9 forward, 4-6 backward",
    tip:"Mnemonic: 'TEMPORAL = TEMPORary to LONG-term storage' — hippocampus converts short-term to long-term memory. If they CAN do digit spans but CAN'T recall later = temporal lobe problem! 🧠"
  },
  {
    n:2, topic:"Hematology",
    q:"Which is the preferred treatment for chronic aplastic anemia?",
    choices:["A. Folic acid","B. Vitamin B2","C. Ferrous sulfate","D. Cyclosporin A","E. Corticosteroids"],
    ans:3,
    exp:"Chronic aplastic anemia is an immune-mediated destruction of hematopoietic stem cells. For patients who are not candidates for bone marrow transplant (older age, no matched donor), immunosuppressive therapy with Cyclosporin A (+ Anti-thymocyte globulin) is preferred. Folic acid treats megaloblastic anemia; iron treats iron-deficiency anemia.",
    kw:["Aplastic anemia","Cyclosporin A","Immunosuppression","Hematopoietic stem cells","Anti-thymocyte globulin"],
    nv:"Normal Hb: Male 13-17 g/dL, Female 12-16 g/dL | Platelets: 150,000-400,000/µL",
    tip:"Remember: Aplastic anemia = IMMUNE attack on marrow → treat with IMMUNE suppression (Cyclosporin A). NOT nutritional supplements! The gold standard is BMT if young + matched donor. 💊"
  },
  {
    n:3, topic:"Infectious Disease",
    q:"The CDC staging system of the HIV infection bases on:",
    choices:["A. The concentration of HIV RNA per 1 ml of plasma","B. Clinical categories and the Interferon-β level in blood","C. The concentration of natural killer (NK) cells per 1 µl of blood","D. Clinical categories and the CD4+ T cell count per 1µl of blood","E. The whole T-cell count per 1 µl of blood"],
    ans:3,
    exp:"The CDC HIV staging system uses TWO parameters: (1) Clinical categories (A=asymptomatic/acute HIV/PGL; B=symptomatic not AIDS-defining; C=AIDS-defining conditions) AND (2) CD4+ T-cell count thresholds (≥500, 200-499, <200 cells/µL). CD4 <200 = AIDS regardless of symptoms.",
    kw:["HIV staging","CD4+ T cells","AIDS","CDC classification","Immunosuppression"],
    nv:"Normal CD4: 500-1500 cells/µL | AIDS if CD4 <200 cells/µL",
    tip:"AIDS = CD4 <200 OR AIDS-defining illness. Memory trick: '200 = Too LOW to go' — below 200 you get opportunistic infections! 🦠"
  },
  {
    n:4, topic:"Hematology",
    q:"A 36-year-old female has presented with fever and fatigue for one month. Physical examination shows no splenomegaly. Blood routine test shows WBC 2,700/μL, hemoglobin 8.0 g/dL, and platelet count 15,000/μL. Blast cells can be seen in blood smear. Which is the most likely diagnosis?",
    choices:["A. Acute leukemia","B. Aplastic anemia","C. Myelofibrosis","D. Chronic leukemia","E. Acute infection"],
    ans:0,
    exp:"KEY FINDING: Blast cells on peripheral blood smear = acute leukemia until proven otherwise. Pancytopenia (low WBC, Hb, platelets) + blast cells = hallmark of acute leukemia. In aplastic anemia you would NOT see blasts — the marrow is empty. Chronic leukemia shows mature cells.",
    kw:["Blast cells","Pancytopenia","Acute leukemia","Blood smear","Peripheral blood"],
    nv:"Normal WBC: 4,500-11,000/µL | Blasts: <5% in normal marrow | >20% blasts in marrow = AML/ALL",
    tip:"BLASTS = BAD = ACUTE leukemia. No blasts + empty marrow = Aplastic. Remember: Blasts are immature, primitive cells that shouldn't be in blood! 🔬"
  },
  {
    n:5, topic:"Cardiology",
    q:"A 76-year-old man presented with gradual onset shortness of breath worsening over 2 months, unable to lie flat. A diagnosis of heart failure was confirmed. Which one of the following has NOT been proved to improve the prognosis of this patient in the long run?",
    choices:["A. Spironolactone","B. Captopril","C. Losartan","D. Digoxin","E. Metoprolol"],
    ans:3,
    exp:"Digoxin improves symptoms and reduces hospitalizations in heart failure, but has NOT been proven to reduce mortality in large trials (DIG trial). In contrast, ACE inhibitors (Captopril), ARBs (Losartan), beta-blockers (Metoprolol), and aldosterone antagonists (Spironolactone) all have proven mortality benefit in HF with reduced EF.",
    kw:["Heart failure","Digoxin","Mortality benefit","ACE inhibitors","Beta-blockers","Spironolactone","Prognosis"],
    nv:"Normal EF: 55-70% | HFrEF: EF <40%",
    tip:"Mnemonic for HF mortality benefit: 'ABCDS' — ACE/ARB, Beta-blocker, Cardiac (Spiro/Eplerenone), SGLT2i. Digoxin is symptom relief ONLY, not survival! ❤️"
  },
  {
    n:6, topic:"Gastroenterology",
    q:"Male, 26 years old, usually has fasting and abdominal pain at night for 3 years, which can be relieved after eating. 1 hour before the meal, he suddenly felt severe pain in the upper abdomen. The first check should be:",
    choices:["A. Abdominal ultrasound","B. Abdominal CT","C. Plain abdominal radiograph","D. Emergency gastroscopy","E. Blood WBC"],
    ans:2,
    exp:"This patient has peptic ulcer disease (relieved by eating = duodenal ulcer pattern). Sudden severe upper abdominal pain suggests perforation. The FIRST investigation for suspected perforation is plain abdominal X-ray (erect) to look for FREE AIR UNDER THE DIAPHRAGM — a quick, cheap, highly specific finding. Gastroscopy is CONTRAINDICATED in perforation!",
    kw:["Peptic ulcer","Perforation","Free air","Plain radiograph","Pneumoperitoneum","Duodenal ulcer"],
    nv:"Free air under diaphragm = perforation until proven otherwise",
    tip:"Sudden severe pain + ulcer history = PERFORATION! FIRST test = ERECT CXR or abdominal X-ray for FREE AIR. Never scope a perforation! X-ray first, always! 📷"
  },
  {
    n:7, topic:"Respiratory",
    q:"The most common pathogen for acute exacerbation of bronchiectasis is:",
    choices:["A. Streptococcus pneumoniae","B. Haemophilus influenzae and Pseudomonas aeruginosa","C. Staphylococcus aureus","D. Anaerobic bacteria","E. Atypical pathogens"],
    ans:1,
    exp:"In bronchiectasis, chronic airway damage and mucus pooling predispose to colonization and infection. Haemophilus influenzae is the most common early colonizer, while Pseudomonas aeruginosa is predominant in advanced bronchiectasis. Both are the primary pathogens in acute exacerbations. Strep pneumoniae is more typical for community-acquired pneumonia.",
    kw:["Bronchiectasis","Haemophilus influenzae","Pseudomonas aeruginosa","Exacerbation","Chronic lung infection"],
    nv:null,
    tip:"Bronchiectasis bugs: 'H.i. FIRST, Pseudo LATER'. As the disease progresses, Pseudomonas takes over. Think 'Damaged Airways = Pseudomonas plays!' 🦠"
  },
  {
    n:8, topic:"Cardiology",
    q:"A 68-year-old man with shortness of breath for 5 months, orthopnea, bilateral crackles, pitting edema, LVH on ECG, pro-BNP 5400 pg/mL, troponin 0.22 ng/mL, EF 38% on echo. What is the most likely diagnosis?",
    choices:["A. AECOPD","B. STEMI","C. NSTEMI","D. Heart failure","E. Stroke"],
    ans:3,
    exp:"Classic heart failure presentation: orthopnea, bilateral crackles (pulmonary edema), pitting edema (right-sided), elevated pro-BNP (>900 pg/mL strongly suggests HF), dilated LV with reduced EF 38% = HFrEF. The mildly elevated troponin is common in HF due to myocardial stress — does not diagnose acute MI without clinical context/ECG changes.",
    kw:["Heart failure","BNP","Ejection fraction","HFrEF","Orthopnea","Pulmonary edema"],
    nv:"BNP >100 pg/mL or NT-proBNP >300 pg/mL suggests HF | EF <40% = HFrEF",
    tip:"High BNP + Low EF + bilateral crackles + edema = HEART FAILURE formula. BNP = 'Breathless Natriuretic Peptide' — it rises when the heart is stretched! 💙"
  },
  {
    n:9, topic:"Respiratory",
    q:"A woman, 34 years old, worker, repeatedly coughed for more than 20 years, coughed with yellow and purulent sputum after being cooled, and had a sudden hemorrhage of 500ml. X-ray shows lower left lung bead-like change with exudation. Which disease is most likely?",
    choices:["A. Acute bronchitis","B. Chronic bronchitis","C. Tuberculosis","D. Lung cancer","E. Bronchial dilation (Bronchiectasis)"],
    ans:4,
    exp:"Key features: 20-year history of recurrent productive cough + purulent sputum + massive hemoptysis (500mL) + 'bead-like' (cystic/dilated) changes on X-ray at lower lobe. This is BRONCHIECTASIS. The lower lobe predilection, chronic productive cough, and 'tram-track' or bead-like shadows are classic. TB tends to involve upper lobes.",
    kw:["Bronchiectasis","Hemoptysis","Bead-like shadows","Chronic productive cough","Lower lobe"],
    nv:"Massive hemoptysis: >300-500 mL/24hrs",
    tip:"BRONCHIECTASIS = 'Bronchi that are ECTATIC (dilated)'. Clues: Chronic cough + LOTS of sputum + hemoptysis + lower lobe changes. Bead-like = saccular bronchiectasis on X-ray! 🫁"
  },
  {
    n:10, topic:"Infectious Disease",
    q:"As for typhoid fever, which is NOT correct?",
    choices:["A. Caused by S typhi","B. Is a severe multisystemic illness","C. The classic prolonged fever","D. Is self-limited disease","E. Rigors are rare"],
    ans:3,
    exp:"Typhoid fever IS caused by Salmonella typhi. It IS a severe multisystemic illness. It DOES cause prolonged sustained fever (stepladder pattern). Rigors ARE rare in typhoid (unlike malaria/bacteremia). However, typhoid is NOT simply self-limited — without antibiotics it can be fatal (intestinal perforation, hemorrhage). Thus 'self-limited' is the INCORRECT statement.",
    kw:["Typhoid fever","Salmonella typhi","Stepladder fever","Enteric fever","Rose spots"],
    nv:"Typhoid incubation: 1-3 weeks | Fever: sustained, up to 40°C",
    tip:"Typhoid is NOT self-limited — it can kill! Remember: rose spots, relative bradycardia, stepladder fever, and NO rigors. 'RRSN' = Rose spots, Relative bradycardia, Stepladder fever, No rigors! 🌡️"
  },
  {
    n:11, topic:"Gastroenterology",
    q:"Female, 24 years old, abdominal distension for one month, low fever. Exam: abdominal distention, tenderness and rebound pain, liver/spleen not touched, positive mobile dullness. Ascites = exudate, ADA 60 U/L. Most likely diagnosis?",
    choices:["A. Spontaneous peritonitis","B. Cirrhotic ascites","C. Tuberculous peritonitis","D. Suppurative peritonitis","E. Cancerous ascites"],
    ans:2,
    exp:"KEY CLUE: Elevated ADA (Adenosine deaminase) in ascitic fluid is a highly sensitive marker for TUBERCULOUS peritonitis (ADA >40 U/L is significant). Combined with: young patient, low-grade fever, exudative ascites, and chronic course — this is classic TB peritonitis. Cirrhotic ascites is a transudate. Suppurative peritonitis would be more acute and severe.",
    kw:["ADA","Adenosine deaminase","Tuberculous peritonitis","Exudate","Ascites","TB"],
    nv:"ADA >40 U/L in ascites = strongly suggests TB peritonitis | Exudate: protein >25g/L, LDH elevated",
    tip:"ADA elevated in ascites = TB peritonitis! Think 'ADA = Anti-Disease Agent for TB'. Also remember: young patient + low fever + exudate = TB until proven otherwise! 🦠"
  },
  {
    n:12, topic:"Gastroenterology",
    q:"The most widely used method to detect Hp (H. pylori) in clinic is:",
    choices:["A. Rapid urease test","B. Histopathological examination","C. 13C/14C-urea breath test","D. Detection of serum Hp antibody","E. Bacterial culture"],
    ans:2,
    exp:"The 13C/14C-urea breath test (UBT) is the gold standard non-invasive test for H. pylori — it's the most widely used in clinical practice. It detects active infection and is used to confirm eradication. Rapid urease test (RUT) requires endoscopy biopsy. Serology can't distinguish active from past infection. Culture is gold standard for sensitivity testing but impractical.",
    kw:["H. pylori","Urea breath test","13C","14C","Non-invasive","Active infection"],
    nv:null,
    tip:"UBT = Best test for H. pylori! Remember: 'You BREATHE for H. pylori' — non-invasive, detects ACTIVE infection, great for checking eradication. Serology = past or present, UBT = DEFINITELY now! 😮‍💨"
  },
  {
    n:13, topic:"Psychiatry",
    q:"A 27-year-old woman with episodic sadness since adolescence. Good periods seldom last >2 weeks. Able to work but not optimally. Focuses on repeated disappointments and low self-esteem rather than discrete depressive symptoms. Most likely diagnosis?",
    choices:["A. Major depression with melancholia","B. Adjustment disorder with depressed mood","C. Cyclothymia","D. Childhood depression","E. Dysthymia"],
    ans:4,
    exp:"Dysthymia (now called Persistent Depressive Disorder in DSM-5) = chronically depressed mood for ≥2 years, with periods of normal mood lasting <2 months. The patient has this since adolescence, can function, but is chronically low. Not meeting full criteria for MDD. The key is CHRONIC + LOW-GRADE + FUNCTIONAL. Cyclothymia has both hypo/depressive episodes.",
    kw:["Dysthymia","Persistent depressive disorder","Chronic depression","Low-grade","Mood disorder"],
    nv:"Dysthymia duration: ≥2 years (adults), ≥1 year (children)",
    tip:"DYSTHYMIA = 'Dis-THYMOS' (bad mood) — like a grey cloud that never fully goes away. Think 'Dysthmia = Dreary but Doesn't stop Daily duties'. It's the 'double depression' when MDD hits on top! 😔"
  },
  {
    n:14, topic:"Respiratory",
    q:"Male, 42 years old with idiopathic pulmonary fibrosis. As for the characteristics of the disease, the following is INCORRECT:",
    choices:["A. Restricted ventilation impairment","B. Diffusion disorder and hypoxemia","C. Clubbing finger (toe)","D. The total number of d-half cells and eosinophils increased significantly","E. ANA was positive"],
    ans:3,
    exp:"IPF is characterised by: restrictive pattern (not obstructive), reduced DLCO (diffusion), progressive hypoxemia, finger clubbing, and sometimes positive ANA (low titer). The INCORRECT finding is: significantly increased eosinophils — this is NOT a feature of IPF. Eosinophilia would suggest eosinophilic pneumonia. IPF pathology shows fibroblastic foci, not eosinophils.",
    kw:["IPF","Idiopathic pulmonary fibrosis","Restrictive","DLCO","Clubbing","UIP pattern"],
    nv:"FVC <80% + FEV1/FVC normal/high = restrictive | DLCO reduced in IPF",
    tip:"IPF = FIBROSIS = RESTRICTION (can't expand) = low FVC, normal/high FEV1/FVC ratio. Velcro crackles + clubbing + bilateral lower lobe honeycombing on CT = IPF! 🔬"
  },
  {
    n:15, topic:"Pharmacology",
    q:"Which one of the following medicines may result in hypokalemia?",
    choices:["A. Aldosterone","B. Captopril","C. Hydrochlorothiazide","D. Irbesartan","E. Digoxin"],
    ans:2,
    exp:"Hydrochlorothiazide (thiazide diuretic) blocks NaCl reabsorption in the distal convoluted tubule, leading to increased K+ secretion → HYPOKALEMIA. Aldosterone promotes K+ excretion (endogenous hormone), but it's the excess (primary hyperaldosteronism) that causes hypokalemia. Captopril (ACE-I) and Irbesartan (ARB) actually RAISE K+ (hyperkalemia risk). Digoxin doesn't directly cause it.",
    kw:["Hypokalemia","Thiazide","Hydrochlorothiazide","ACE inhibitor","Potassium"],
    nv:"Normal K+: 3.5-5.0 mmol/L | Hypokalemia: <3.5 mmol/L",
    tip:"THIAZIDES and LOOP diuretics = LOSE K+. ACE inhibitors and ARBs = KEEP K+ (dangerous in renal failure!). Mnemonic: 'THIAZIDES THROW away K+' 💊"
  },
  {
    n:16, topic:"Cardiology",
    q:"A 90-year-old woman with hypertension presents with exertional chest pain. Exam: BP 140/76, HR 78. Systolic murmur over 2nd ICS right sternal border radiating to carotids. Most likely diagnosis?",
    choices:["A. Aortic stenosis","B. Aortic regurgitation","C. Mitral stenosis","D. Mitral regurgitation","E. Tricuspid regurgitation"],
    ans:0,
    exp:"Classic aortic stenosis: SYSTOLIC murmur at 2nd ICS RIGHT sternal border (aortic area) RADIATING to carotids + exertional chest pain + elderly with hypertension. The classic triad of AS = Syncope, Angina, Dyspnea (SAD). Aortic regurgitation = diastolic murmur. Mitral murmurs are at the apex.",
    kw:["Aortic stenosis","Systolic murmur","Aortic area","Carotid radiation","SAD triad","Calcific AS"],
    nv:"Normal aortic valve area: 3-4 cm² | Severe AS: <1 cm²",
    tip:"Aortic Stenosis = 'RADS' = Right sternal border, Aortic area (2nd ICS), Diastolic gap (actually systolic!), Shoots to neck. Triad: SAD = Syncope, Angina, Dyspnea! 🫀"
  },
  {
    n:17, topic:"Neurology/Psychiatry",
    q:"A 69-year-old man with slow, stepwise decline in cognitive functioning over 1 year. Wife noticed memory and navigation problems. Patient says he feels fine, is depressed about memory loss. Eating and sleeping well. Most likely diagnosis?",
    choices:["A. Multi-infarct dementia","B. Mood disorder secondary to a general medical condition","C. Schizoaffective disorder","D. Delirium","E. Major depression"],
    ans:0,
    exp:"STEPWISE decline = vascular/multi-infarct dementia (not gradual as in Alzheimer's). The patient has INSIGHT (aware of memory loss, depressed about it) — this is not anosognosia. The stepwise pattern suggests small strokes causing progressive damage. Delirium is acute. Major depression causes pseudodementia but without stepwise pattern. Patient functions (eats/sleeps).",
    kw:["Multi-infarct dementia","Vascular dementia","Stepwise decline","Stroke","Insight preserved"],
    nv:null,
    tip:"STEPWISE = STROKES = Vascular dementia. Alzheimer's = GRADUAL smooth decline. Easy: Steps = Strokes! Also, patient has INSIGHT (knows they forget) — unlike late Alzheimer's! 🧠"
  },
  {
    n:18, topic:"Infectious Disease",
    q:"Which of the following is the basis for confirming sepsis?",
    choices:["A. Chill and fever, symptoms of poisoning","B. Rash","C. Hepatomegaly and splenomegaly","D. White blood cells and neutrophils count increased significantly","E. Blood and/or bone marrow culture positive"],
    ans:4,
    exp:"The definitive/confirmatory diagnosis of sepsis requires microbiological evidence — positive blood culture (or bone marrow culture) identifies the causative organism. Clinical features (fever, chills, elevated WBC) suggest sepsis but are NOT confirmatory — they can occur in many conditions. Culture = gold standard for confirming infectious etiology.",
    kw:["Sepsis","Blood culture","Bacteremia","Confirmatory diagnosis","Gold standard"],
    nv:"Blood culture: 2 sets from different sites before antibiotics | Positive = significant",
    tip:"'CULTURE is KING' for confirming infection! Always draw blood cultures BEFORE giving antibiotics. 2 sets from 2 sites = best sensitivity. Sepsis confirmed = positive culture! 🧫"
  },
  {
    n:19, topic:"Gastroenterology",
    q:"Male, 25 years old, acute left upper abdominal pain after excessive alcohol, nausea, vomiting without relief. Tenderness + muscle tension, mobile dullness (-), X-ray: intestinal inflation, 2-3 liquid levels, NO free gas under diaphragm. Most likely diagnosis?",
    choices:["A. Acute gastroenteritis","B. Perforation of ulceration","C. Acute cholecystitis","D. Acute pancreatitis","E. Acute intestinal obstruction"],
    ans:3,
    exp:"Acute pancreatitis after ALCOHOL + severe epigastric/LUQ pain + nausea/vomiting + intestinal ileus (inflation, fluid levels) WITHOUT free air (ruling out perforation) = classic ACUTE PANCREATITIS. Alcohol is a major cause. Perforation shows FREE AIR. Cholecystitis is RUQ. The absent free gas is key to exclude perforation.",

let current = 0;
let answered = {};
let filter = 'all';
let filteredList = qs.map((_,i)=>i);

function setFilter(f){
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  applyFilter();
  current = 0;
  render();
}

function applyFilter(){
  if(filter==='all') filteredList = qs.map((_,i)=>i);
  else if(filter==='wrong') filteredList = qs.map((_,i)=>i).filter(i=>answered[i]==='wrong');
  else if(filter==='unanswered') filteredList = qs.map((_,i)=>i).filter(i=>!answered[i]);
}

function gotoQ(val){
  const n = parseInt(val)-1;
  if(n>=0 && n<qs.length){
    const idx = filteredList.indexOf(n);
    if(idx>=0){ current=idx; render(); }
    else{ alert('Q'+val+' not in current filter. Switching to All.'); filter='all'; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); document.querySelector('.filter-btn').classList.add('active'); applyFilter(); current=n; render(); }
  }
}

function move(dir){
  current = Math.max(0, Math.min(filteredList.length-1, current+dir));
  render();
}

function skipQ(){
  if(!answered[filteredList[current]]) answered[filteredList[current]]='skip';
  move(1);
}

function choose(qi, ci, correct){
  if(answered[qi]) return;
  answered[qi] = (ci===correct)?'correct':'wrong';
  render();
}

function render(){
  applyFilter();
  if(filteredList.length===0){ document.getElementById('q-area').innerHTML='<p style="color:var(--color-text-secondary);padding:1rem 0;">No questions match this filter.</p>'; return; }
  current = Math.max(0, Math.min(filteredList.length-1, current));
  const qi = filteredList[current];
  const q = qs[qi];
  const ans = answered[qi];
  const correct = q.ans;

  let choicesHTML = q.choices.map((c,i)=>{
    let cls = 'choice-btn';
    let dis = ans?'disabled':'';
    if(ans && i===correct) cls+=' correct';
    if(ans && i!==correct && ((ans==='wrong' && i!==correct && answered[qi]!='correct') || false)) cls+=''
    if(ans==='wrong'){
      const chosen = q.choices.findIndex((_,idx)=>idx!==correct && ans==='wrong');
    }
    if(ans && i===correct) cls='choice-btn correct';
    return `<button class="${cls}" ${dis} onclick="choose(${qi},${i},${correct})">${c}</button>`;
  }).join('');

  if(ans==='wrong'){
    const wrongIdx = q.choices.findIndex((_,i)=> i!==correct);
    choicesHTML = q.choices.map((c,i)=>{
      let cls='choice-btn';
      if(i===correct) cls+=' correct';
      return `<button class="${cls}" disabled>${c}</button>`;
    }).join('');
  }

  const revClass = ans ? 'reveal-section show' : 'reveal-section';
  const normalVals = q.nv ? `<div class="section-label">📊 Normal values</div><div class="normal-vals">${q.nv}</div>` : '';

  const emojiMap = {correct:'✅',wrong:'❌',skip:'⏭️'};

  document.getElementById('q-area').innerHTML = `
    <div class="q-card">
      <div class="q-num">Question ${q.n} of 100 — ${q.topic} ${ans?emojiMap[ans]:''}</div>
      <div class="q-text">${q.q}</div>
      <div class="choices">${choicesHTML}</div>
      <div class="${revClass}">
        <div class="section-label">✅ Correct answer</div>
        <div class="answer-badge">${q.choices[correct]}</div>
        <div class="section-label" style="margin-top:10px;">💡 Explanation</div>
        <div class="explanation">${q.exp}</div>
        <div class="section-label" style="margin-top:10px;">🔑 Key words</div>
        <div class="keywords">${q.kw.map(k=>`<span class="kw">${k}</span>`).join('')}</div>
        ${normalVals}
        <div class="section-label" style="margin-top:10px;">🧠 Study tip</div>
        <div class="tip">${q.tip}</div>
      </div>
    </div>
  `;

  const total = qs.length;
  const cor = Object.values(answered).filter(v=>v==='correct').length;
  const wrg = Object.values(answered).filter(v=>v==='wrong').length;
  const skp = Object.values(answered).filter(v=>v==='skip').length;
  document.getElementById('prog').style.width = (Object.keys(answered).length/total*100)+'%';
  document.getElementById('cur-stat').textContent = qi+1;
  document.getElementById('cor-stat').textContent = cor;
  document.getElementById('wrg-stat').textContent = wrg;
  document.getElementById('skp-stat').textContent = skp;
  document.getElementById('q-cnt').textContent = `${current+1} / ${filteredList.length} ${filter!=='all'?'(filtered)':''}`;
}

render();
</script>
